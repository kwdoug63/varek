# SPDX-License-Identifier: MIT
# hotl_policy.cfg — a human-out-of-the-loop policy for VAREK >= v1.9.
#
# Demonstrates the three v1.8.2 breaker directives and a policy that the
# v1.9 progress verifier CERTIFIES. The intent: an agent issues financial
# actions; an over-limit action is refused; the system resolves itself
# (re-plan, or after the budget, a pre-authorized abort) with no human.

varek_policy 1

# A sticky label so the policy can refuse — and so the progress verifier
# treats refusal resolution as load-bearing (P1 applies).
label SECRET 0
sticky SECRET

# --- v1.8.2 bounded-refusal breaker ---------------------------------
# Tolerate up to 3 retryable refusals of the same (session, action)
# signature, then resolve deterministically.
refusal_budget 3

# Once the budget is spent, fire a pre-authorized safe action rather than
# escalating to a human. abort_txn is declared below and authorizes as a
# standalone terminal (no sticky deny), so v1.9 P4 holds.
on_exhaustion terminal abort_txn

# An UNKNOWN verdict is never retried (a re-run reproduces it); deny is a
# valid automated terminal (the host aborts the task).
unknown_disposition deny

# --- flow rules ------------------------------------------------------
rule read_balance
  origin SECRET

# Egress that must never carry SECRET. A plan that routes raw SECRET here
# is refused on the flow axis.
rule write_check
  deny_in SECRET

# The pre-authorized terminal. It neither originates nor denies SECRET,
# so it authorizes standalone and is not deadlock-prone.
rule abort_txn
