# uncertified_policy.cfg — a policy that the v1.9 progress verifier REJECTS.
#
# It can refuse (sticky SECRET + a deny_in rule) but declares no
# refusal_budget, so an over-limit or flow-refused action could be
# resubmitted forever with no automated terminal — a hang only a human
# could break. v1.9 obligation P1 fails and the Warden refuses to boot it
# unattended. Add `refusal_budget N` and terminal dispositions to certify.

varek_policy 1

label SECRET 0
sticky SECRET

rule read_balance
  origin SECRET

rule write_check
  deny_in SECRET
