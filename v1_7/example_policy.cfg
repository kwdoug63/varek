# VAREK label policy — example.
# Demonstrates the v1.7 feature surface end to end: declared labels,
# the plan-wide sticky set, per-action rules, and (v1.7.4) argument
# pattern matching for the canonical internal-vs-external send case.

varek_policy 1

# Posture: omit `strict` and let the kernel's sticky fail-safe catch
# anything an unmatched action receives. Recommended default; see NOTES.

# Label declarations.
label SECRET 0
label PII    1
label PUBLIC 2

# Plan-wide sticky set — these labels demand explicit disposition at
# every node they reach.
sticky SECRET
sticky PII

# Actions.

rule read_secret
  origin SECRET

rule read_user_record
  origin PII

# log_event observes both sensitive classes legitimately (e.g. audit
# log keyed to a hash); explicit permit makes that intent first-class.
rule log_event
  permit_in SECRET
  permit_in PII

# v1.7.4 argument matching: send_http to internal endpoints is
# permitted for sensitive labels; everything else is denied. Rules
# are walked in declaration order — first match wins — so the
# permissive rule MUST precede the deny fallback.
rule send_http
  match url https://*.internal.acme.com/*
  permit_in SECRET
  permit_in PII

rule send_http
  deny_in SECRET
  deny_in PII

# A handler whose policy is being worked out: classify PII as
# unknown_in so plans routing PII through it are refused with UNKNOWN
# (and the operator can audit the refusal log and decide).
rule new_handler
  unknown_in PII

# v1.8.0 declassification: a redactor is explicitly trusted to observe
# SECRET (permit_in) AND to cleanse it (declassify), so data sanitized
# by the redactor may flow onward — a sanitize-then-send workflow. Both
# assertions are required: with permit_in alone the secret would still
# propagate and be denied at egress; with declassify alone the redactor
# would fail closed to UNKNOWN (sticky SECRET, no permit). Every
# declassification is recorded in the audit trail.
rule redact_secret
  permit_in SECRET
  declassify SECRET
