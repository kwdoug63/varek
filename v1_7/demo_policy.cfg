# VAREK demo policy. Covers the scenarios driven by varek_demo.
# Two sensitive labels, both sticky (must be explicitly handled
# everywhere they flow). Internal processing steps are trusted to
# carry secrets; a redactor may cleanse them; egress is denied except
# to internal endpoints.

varek_policy 1

label SECRET 0
label PII    1

sticky SECRET
sticky PII

# Sources of sensitive data.
rule read_secret
  origin SECRET

rule read_user_record
  origin PII

# Internal processing steps, trusted to handle sensitive data in flight.
rule transform
  permit_in SECRET
  permit_in PII

rule enrich
  permit_in SECRET
  permit_in PII

# Redactor: trusted to observe SECRET and to cleanse it. Enables a
# sanitize-then-send workflow (v1.8.0 declassification).
rule redact
  permit_in SECRET
  declassify SECRET

# Egress. Internal endpoints may receive sensitive data; first match
# wins, so the permissive rule precedes the catch-all deny.
rule send_http
  match url https://*.internal.acme.com/*
  permit_in SECRET
  permit_in PII

rule send_http
  deny_in SECRET
  deny_in PII
